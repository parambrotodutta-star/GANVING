<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Ganving — Rooftop Café, Kolkata</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --amb: #D4862A; --amb-lt: #EBA952;
            --amb-glow: rgba(212,134,42,.22);
            --blur: blur(28px) saturate(200%);
            --r: 12px; --rl: 20px; --rxl: 32px;
            --blk: #080706; --blk2: #0E0D0B; --blk3: #141210;
            --ww: #F0EBE0; --ww60: rgba(240,235,224,.6);
            --ww35: rgba(240,235,224,.35); --ww12: rgba(240,235,224,.1);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body { background: var(--blk); color: var(--ww); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }

        /* --- NAVIGATION --- */
        nav {
            position: fixed; top: 18px; left: 50%; transform: translateX(-50%); z-index: 500;
            width: calc(100% - 2.5rem); max-width: 1180px;
            display: flex; align-items: center; justify-content: space-between;
            padding: .82rem 1.8rem; background: rgba(8,7,6,.42);
            backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            border: 1px solid rgba(212,134,42,.18); border-radius: 100px;
            transition: all .5s cubic-bezier(.77,0,.175,1);
        }
        .n-logo { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800; color: var(--ww); text-decoration: none; letter-spacing: -.03em; }
        .n-logo em { color: var(--amb); font-style: normal; }
        .n-links { display: flex; gap: 2.2rem; list-style: none; }
        .n-links a { font-size: .7rem; letter-spacing: .15em; text-transform: uppercase; color: var(--ww60); text-decoration: none; transition: color .3s; }
        .n-ham { display: none; flex-direction: column; gap: 5px; cursor: pointer; border: none; background: none; }
        .n-ham span { width: 22px; height: 1.5px; background: var(--ww); display: block; }

        /* --- HERO SECTION --- */
        #hero { position: relative; height: 100vh; min-height: 600px; overflow: hidden; display: flex; align-items: flex-end; }
        .hbg-css { position: absolute; inset: 0; z-index: 0; background: #1A0C02; transform: scale(1.06); }
        .hbg-grade { position: absolute; inset: 0; z-index: 2; background: linear-gradient(to top, rgba(8,7,6,1) 0%, rgba(8,7,6,0.2) 100%); }
        .h-wrap { position: relative; z-index: 5; width: 100%; padding: 0 6vw 8vh; }
        .ht-big { 
            display: block; font-family: 'Syne', sans-serif; 
            font-size: clamp(3.5rem, 10vw, 8rem); font-weight: 800; 
            line-height: .82; letter-spacing: -.05em; color: var(--ww);
        }
        .ht-it { font-family: 'Instrument Serif', serif; font-size: clamp(1.2rem, 3vw, 2.5rem); font-style: italic; color: var(--amb-lt); }

        /* --- MENU SECTION --- */
        #menu { padding: 5rem 5vw; background: var(--blk2); }
        .mg { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
        .mi { background: rgba(240,235,224,.05); padding: 1.5rem; border-radius: 18px; border: 1px solid rgba(212,134,42,.1); }

        /* --- MOBILE RESPONSIVE FIXES --- */
        @media (max-width: 992px) {
            .mg { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 768px) {
            nav { width: 90%; padding: 0.8rem 1.2rem; }
            .n-links { display: none; } /* Hide desktop links */
            .n-ham { display: flex; }    /* Show mobile hamburger */
            
            .h-wrap { padding: 0 5vw 10vh; }
            .ht-big { font-size: 4rem; line-height: 1; } /* Fixed sizing for mobile */
            
            .mg { grid-template-columns: 1fr; } /* Stack menu items */
            
            section { padding: 4rem 5vw; }
        }

        /* Mobile Menu Overlay */
        #mob-nav {
            position: fixed; inset: 0; background: var(--blk); z-index: 600;
            display: none; flex-direction: column; align-items: center; justify-content: center; gap: 2rem;
        }
        #mob-nav.active { display: flex; }
        #mob-nav a { font-family: 'Syne', sans-serif; font-size: 2.5rem; color: var(--ww); text-decoration: none; }
    </style>
</head>
<body>

    <nav id="navbar">
        <a href="#" class="n-logo">GAN<em>VING</em></a>
        <ul class="n-links">
            <li><a href="#vibe">Vibe</a></li>
            <li><a href="#menu">Menu</a></li>
            <li><a href="#reviews">Reviews</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
        <button class="n-ham" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </button>
    </nav>

    <div id="mob-nav">
        <button style="position:absolute; top:2rem; right:2rem; background:none; color:white; border:none; font-size:2rem;" onclick="toggleMenu()">×</button>
        <a href="#vibe" onclick="toggleMenu()">Vibe</a>
        <a href="#menu" onclick="toggleMenu()">Menu</a>
        <a href="#contact" onclick="toggleMenu()">Contact</a>
    </div>

    <main id="app" class="in">
        <section id="hero">
            <div class="hbg-css"></div>
            <div class="hbg-grade"></div>
            <div class="h-wrap">
                <span class="ht-it">Where the river meets the sky</span>
                <h1 class="ht-big">GANVING</h1>
            </div>
        </section>

        <section id="menu">
            <h2 style="margin-bottom: 2rem; font-family: 'Syne';">The Collection</h2>
            <div class="mg">
                <div class="mi">
                    <h3 class="ht-it">Signature Brew</h3>
                    <p style="font-size: 0.8rem; opacity: 0.7;">Premium dark roast beans from the hills.</p>
                </div>
                <div class="mi">
                    <h3 class="ht-it">Rooftop Cooler</h3>
                    <p style="font-size: 0.8rem; opacity: 0.7;">Fresh mint and citrus over crushed ice.</p>
                </div>
                <div class="mi">
                    <h3 class="ht-it">Artisan Toast</h3>
                    <p style="font-size: 0.8rem; opacity: 0.7;">Sourdough with local honey and butter.</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        function toggleMenu() {
            const mobNav = document.getElementById('mob-nav');
            mobNav.classList.toggle('active');
        }

        // Simple scroll effect for Navbar
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 50) {
                nav.style.background = "rgba(8,7,6,0.95)";
                nav.style.top = "0";
                nav.style.width = "100%";
                nav.style.borderRadius = "0";
            } else {
                nav.style.background = "rgba(8,7,6,0.42)";
                nav.style.top = "18px";
                nav.style.width = "calc(100% - 2.5rem)";
                nav.style.borderRadius = "100px";
            }
        });
    </script>
</body>
</html>
